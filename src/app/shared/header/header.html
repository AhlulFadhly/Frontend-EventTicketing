<nav class="navbar">
  <div class="navbar__container max-container">
    
    <div class="navbar__logo-section">
      <img alt="Brand Logo" class="navbar__logo" src="screen.png">
      <span class="navbar__title">LUNG EVENTS</span>
    </div>
    
    <div class="navbar__links">
      <a class="navbar__link" mat-button routerLink="/" routerLinkActive="navbar__link--active" [routerLinkActiveOptions]="{exact: true}">Explore</a>
      <a class="navbar__link" mat-button routerLink="/events" routerLinkActive="navbar__link--active">Events</a>
      <a class="navbar__link" mat-button routerLink="/about" routerLinkActive="navbar__link--active">About</a>
    </div>
    
    <div class="navbar__actions">
      
      <ng-container *ngIf="!user; else loggedIn">
        <button class="navbar__btn-login" mat-button routerLink="/login">
          Login
        </button>
        <button class="navbar__btn-register" mat-flat-button color="primary" routerLink="/register">
          Register
        </button>
      </ng-container>
      
      <ng-template #loggedIn>
        <button class="navbar__btn-user" mat-button [matMenuTriggerFor]="userMenu">
          <mat-icon class="navbar__user-icon">account_circle</mat-icon>
          <span class="navbar__username">{{ user?.fullName }}</span>
          <mat-icon class="navbar__arrow-icon">expand_more</mat-icon>
        </button>

        <mat-menu #userMenu="matMenu" class="luxe-menu">
          <button mat-menu-item *ngIf="user?.roles !== 'USER'" (click)="openDashboard()">
            <mat-icon>dashboard</mat-icon>
            <span>Dashboard</span>
          </button>

          <button mat-menu-item *ngIf="user?.roles === 'USER'" (click)="openDashboard()">
            <mat-icon>shopping_cart</mat-icon>
            <span>My Booking</span>
          </button>

          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
          </button>
        </mat-menu>
      </ng-template>

      <button class="navbar__toggle-btn" mat-icon-button [matMenuTriggerFor]="mobileMenu" aria-label="Toggle navigation">
        <mat-icon>menu</mat-icon>
      </button>

      <mat-menu #mobileMenu="matMenu" class="luxe-menu navbar__mobile-menu">
        <button mat-menu-item routerLink="/" routerLinkActive="navbar__link--active" [routerLinkActiveOptions]="{exact: true}">
          <mat-icon>explore</mat-icon>
          <span>Explore</span>
        </button>
        <button mat-menu-item routerLink="/events" routerLinkActive="navbar__link--active">
          <mat-icon>event</mat-icon>
          <span>Events</span>
        </button>
        <button mat-menu-item routerLink="/about" routerLinkActive="navbar__link--active">
          <mat-icon>info</mat-icon>
          <span>About</span>
        </button>
      </mat-menu>

    </div>
  </div>
</nav>
