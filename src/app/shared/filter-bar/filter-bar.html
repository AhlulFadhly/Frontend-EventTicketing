<div class="filters">

  <mat-form-field appearance="outline">

    <mat-label>Category</mat-label>

    <mat-select
      [value]="category"
      (selectionChange)="categoryChange.emit($event.value)">

      <mat-option value="">
        All Categories
      </mat-option>

      @for(category of categories; track category.id){

        <mat-option [value]="category.name">
          {{ category.name }}
        </mat-option>

      }

    </mat-select>

  </mat-form-field>

  <button
    mat-stroked-button
    type="button"
    (click)="reset.emit()">

    Reset

  </button>

</div>
