<nav class="navbar">
    <div class="navbar__container max-container">

        <div class="navbar__logo-section">
            <img alt="Brand Logo" class="navbar__logo" src="screen.png">
            <a href="/">
                <span class="navbar__title">LUNG EVENTS</span>
            </a>
        </div>

        <div class="navbar__actions">

            <ng-container *ngIf="!user; else loggedIn">
                <button class="navbar__btn-login" mat-button routerLink="/login">
                    Login
                </button>
                <button class="navbar__btn-register" mat-flat-button color="primary" routerLink="/register">
                    Register
                </button>
            </ng-container>

            <ng-template #loggedIn>
                <button class="navbar__btn-user" mat-button [matMenuTriggerFor]="menu">
                    <mat-icon class="navbar__user-icon">account_circle</mat-icon>
                    <span class="navbar__username">{{ user?.fullName }}</span>
                    <mat-icon class="navbar__arrow-icon">expand_more</mat-icon>
                </button>

                <mat-menu #menu="matMenu" class="luxe-menu">

                    <button mat-menu-item (click)="logout()">
                        <mat-icon>logout</mat-icon>
                        <span>Logout</span>
                    </button>
                </mat-menu>
            </ng-template>

        </div>
    </div>
</nav>
