<div class="modal-overlay" (click)="onClose.emit()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <div class="modal-card__header">
      <h2>{{ isEdit ? 'Edit Premium Event' : 'Create New Event' }}</h2>
      <button class="btn-close-modal" (click)="onClose.emit()">
        <mat-icon>close</mat-icon>
      </button>
    </div>
    <form class="modal-form" [formGroup]="form" (submit)="$event.preventDefault()">
      <div class="input-group">
        <label class="input-group__label">Banner URL</label>
        <div class="input-field">
          <mat-icon class="input-field__icon">picture_in_picture</mat-icon>
          <input type="text" class="input-field__input" placeholder="e.g. https://picsum.photos/1200/600?random=101" formControlName="banner">
        </div>
      </div>
      <div class="input-group">
        <label class="input-group__label">Event Title</label>
        <div class="input-field">
          <mat-icon class="input-field__icon">title</mat-icon>
          <input type="text" class="input-field__input" placeholder="e.g. Velocity Music Festival" formControlName="title">
        </div>
      </div>
      <div class="grid-two-col gap-sm">
        <div class="input-group">
          <label class="input-group__label">Category</label>
          <div class="input-field">
            <mat-icon class="input-field__icon">category</mat-icon>
            <select class="input-field__input select-field" formControlName="categoryId">
              <option value="" disabled selected>Select Category</option>
              @for(c of categories; track c.id){
              <option [value]="c.id">
                {{ c.name }}
              </option>
              }
            </select>
          </div>
        </div>
        <div class="input-group">
          <label class="input-group__label">Venue Location</label>
          <div class="input-field">
            <mat-icon class="input-field__icon">near_me</mat-icon>
            <select class="input-field__input select-field" formControlName="venueId">
              <option value="" disabled selected>Select Venue</option>
              @for(v of venues; track v.id){
              <option [value]="v.id" class="venue-option">
                <div class="venue-name">
                  {{ v.name }}
                </div>
                <div class="venue-sub">
                  {{ v.address }}, {{ v.city }}
                </div>
              </option>
              }
            </select>
          </div>
        </div>
      </div>
      <div class="input-group">
        <label class="input-group__label">Schedule Date & Time</label>
        <div class="input-field">
          <mat-icon class="input-field__icon">calendar_today</mat-icon>
          <input type="datetime-local" class="input-field__input" formControlName="time">
        </div>
      </div>
      <div class="input-group">
        <label class="input-group__label">Description</label>
        <textarea class="glass-textarea" rows="3" placeholder="Describe the premium essence..." formControlName="description"></textarea>
      </div>
      <div class="modal-card__footer">
        <button type="button" class="btn-secondary-modal" (click)="onClose.emit()">Cancel</button>
        <button type="submit" class="btn-submit-modal" (click)="submit()">{{ isEdit ? 'Save Changes' : 'Deploy Event' }}</button>
      </div>
    </form>
  </div>
</div>
