<div class="modal-overlay" (click)="onClose.emit()">
  <div class="modal-card modal-card--small" (click)="$event.stopPropagation()">
    <div class="modal-card__header">
      <h2>{{ isEdit ? 'Modify Ticket Structure' : 'Add Ticket Tier' }}</h2>
      <button class="btn-close-modal" (click)="onClose.emit()">
        <mat-icon>close</mat-icon>
      </button>
    </div>
    
    <form class="modal-form"  [formGroup]="form" (ngSubmit)="$event.preventDefault()">
      
      <div class="input-group">
        <label class="input-group__label">Ticket Tier Name</label>
        <div class="input-field">
          <mat-icon class="input-field__icon">local_play</mat-icon>
          <input type="text" formControlName="name" class="input-field__input" placeholder="e.g. VIP Lounge, Regular Access">
        </div>
      </div>
      
      <div class="grid-two-col gap-sm">
        <div class="input-group">
          <label class="input-group__label">Price (IDR)</label>
          <div class="input-field">
            <mat-icon class="input-field__icon">payments</mat-icon>
            <input type="number" formControlName="price" class="input-field__input" placeholder="0.00">
          </div>
        </div>
        <div class="input-group">
          <label class="input-group__label">Total Quota</label>
          <div class="input-field">
            <mat-icon class="input-field__icon">groups</mat-icon>
            <input type="number" formControlName="quota" class="input-field__input" placeholder="e.g. 50">
          </div>
        </div>
      </div>
      
      <div class="input-group">
        <label class="input-group__label">Start Date & Time</label>
        <div class="input-field">
          <mat-icon class="input-field__icon">calendar_today</mat-icon>
          <input type="datetime-local" formControlName="saleStart" class="input-field__input">
        </div>
      </div>
      
      <div class="modal-card__footer">
        <button type="button" class="btn-secondary-modal" (click)="onClose.emit()">Cancel</button>
        <button type="submit" class="btn-submit-modal" (click)="submit()">Confirm Structure</button>
      </div>
    </form>
  </div>
</div>
